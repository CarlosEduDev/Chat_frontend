<div class="fixed inset-0 bg-[#0B1326] text-[#DAE2FD] flex flex-col h-screen w-screen overflow-hidden">
    
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-[#2563EB]/10 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-[#4AE176]/5 blur-[120px]"></div>
    </div>

    <main class="relative w-full min-h-screen grid grid-cols-1 lg:grid-cols-2 overflow-hidden shadow-none border-none">
        
        <section class="hidden lg:flex flex-col justify-between p-12 bg-[#0B1326] relative overflow-hidden">
            <div class="relative z-20">
                <div class="flex items-center  mb-10">
                    <span class="text-2xl font-black tracking-tighter text-[#DAE2FD]">Team</span>
                <span class="text-2xl font-black tracking-tighter text-[#446ffd]">Room</span>
                </div>
                
                <h1 class="text-5xl font-extrabold tracking-tight leading-tight mb-6  mt-60  text-[#DAE2FD]">
                    Bem vindo(a) <br/>
                    <span class="text-[#2563EB]">ao TeamRoom.</span>
                </h1>
                <p class="text-[#C3C6D7] text-lg max-w-sm">
                    Um simples espaço para conversas profundas com outros usuários.
                </p>
            </div>

            <div class="absolute inset-0 z-0 opacity-20">
                <img alt="Night background" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d"/>
                <div class="absolute inset-0 bg-gradient-to-t from-[#0B1326] via-transparent to-transparent"></div>
            </div>
        </section>  

        <section class="p-8 md:p-16 flex flex-col justify-center bg-[#0B1326]">
            <div class="w-full max-w-md mx-auto">
                <header class="mb-10 text-center lg:text-left">
                    <h2 class="text-3xl font-bold tracking-tight text-[#DAE2FD] text-center mb-2">Seja bem vindo(a) de volta!</h2>
                    <p class="text-[#C3C6D7] text-center">Volte para suas conversas.</p>
                </header>

                <form (ngSubmit)="onsubmit()" class="space-y-6">
                    
                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-[#434655]/30"></div>
                        <span class="flex-shrink mx-4 text-xs font-bold uppercase tracking-widest text-[#C3C6D7]">Entre com sua conta</span>
                        <div class="flex-grow border-t border-[#434655]/30"></div>
                    </div>

                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-[#DAE2FD] ml-1" for="email">Email</label>
                            <div class="relative group">
                                <lucide-icon [name]="Mail" 
                                    class="absolute left-2.5 top-1/2 -translate-y-1/2 w-5 h-5 text-[#C3C6D7] transition-colors group-focus-within:text-[#2563EB]">
                                </lucide-icon>
                                <input [(ngModel)]="email" name="email" type="email" id="email" placeholder="email@exemplo.com"
                                    class="w-full pl-14 pr-4 py-4 rounded-xl bg-[#171F33] border border-[#434655]/30 focus:border-[#2563EB]/50 focus:ring-4 focus:ring-[#2563EB]/10 text-[#DAE2FD] placeholder:text-[#C3C6D7]/40 transition-all outline-none" />
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-[#DAE2FD] ml-1" for="password">Senha</label>
                            <div class="relative group">
                                <lucide-icon [name]="Lock" 
                                    class="absolute left-2.5 top-1/2 -translate-y-1/2 w-5 h-5 text-[#C3C6D7] transition-colors group-focus-within:text-[#2563EB]">
                                </lucide-icon>
                                <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" id="password" placeholder="••••••••"
                                    class="w-full pl-14 pr-14 py-4 rounded-xl bg-[#171F33] border border-[#434655]/30 focus:border-[#2563EB]/50 focus:ring-4 focus:ring-[#2563EB]/10 text-[#DAE2FD] placeholder:text-[#C3C6D7]/40 transition-all outline-none" />
                                
                                <button (click)="togglePassword()" type="button" class="absolute right-5 top-1/2 -translate-y-1/2 text-[#C3C6D7] hover:text-[#DAE2FD] transition-colors cursor-pointer">
                                    <lucide-icon [name]="showPassword ? Eye : EyeOff" class="w-5 h-5"></lucide-icon>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 px-1">
                        <input [(ngModel)]="rememberMe" name="rememberMe" type="checkbox" id="remember" 
                            class="w-4 h-4 rounded border-[#434655] bg-[#171F33] text-[#2563EB] focus:ring-[#2563EB]/40 focus:ring-offset-[#0B1326]"/>
                        <label class="text-sm text-[#C3C6D7] cursor-pointer select-none" for="remember">Lembrar desta conta</label>
                    </div>

                    <button class="w-full py-4 rounded-xl bg-[#2563EB] hover:bg-[#1D4ED8] text-white font-bold text-lg shadow-xl active:scale-[0.98] transition-all relative overflow-hidden group cursor-pointer" type="submit">
                        <span class="relative z-10">Entrar</span>
                        <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                    </button>
                </form>

                <footer class="mt-10 text-center">
                    <p class="text-[#C3C6D7]">
                        Não tem uma conta? 
                        <a class="text-[#2563EB] font-bold hover:underline underline-offset-4 decoration-2" routerLink="/cadastro">Criar Conta</a>
                    </p>
                </footer>
            </div>
        </section>
    </main>
</div>
