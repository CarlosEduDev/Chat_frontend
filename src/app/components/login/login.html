<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nocturnal - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#283044",
                        "on-primary-fixed": "#00174b",
                        "on-tertiary-container": "#c1ffc5",
                        "tertiary": "#4ae176",
                        "on-secondary-container": "#aeb9d0",
                        "surface-tint": "#b4c5ff",
                        "surface-container-high": "#222a3d",
                        "tertiary-fixed": "#6bff8f",
                        "inverse-surface": "#dae2fd",
                        "inverse-primary": "#0053db",
                        "secondary": "#bcc7de",
                        "outline-variant": "#434655",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c3c6d7",
                        "primary-container": "#2563eb",
                        "primary-fixed": "#dbe1ff",
                        "tertiary-container": "#007e37",
                        "on-secondary-fixed": "#111c2d",
                        "error": "#ffb4ab",
                        "on-background": "#dae2fd",
                        "surface-bright": "#31394d",
                        "outline": "#8d90a0",
                        "on-tertiary-fixed-variant": "#005321",
                        "background": "#0b1326",
                        "primary": "#b4c5ff",
                        "surface-variant": "#2d3449",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-tertiary-fixed": "#002109",
                        "on-secondary": "#263143",
                        "on-primary-container": "#eeefff",
                        "on-tertiary": "#003915",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-dim": "#0b1326",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#2d3449",
                        "on-error": "#690005",
                        "secondary-fixed": "#d8e3fb",
                        "on-primary": "#002a78",
                        "surface": "#0b1326",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-fixed-variant": "#3c475a",
                        "tertiary-fixed-dim": "#4ae176",
                        "secondary-container": "#3e495d",
                        "secondary-fixed-dim": "#bcc7de",
                        "surface-container": "#171f33",
                        "error-container": "#93000a",
                        "surface-container-low": "#131b2e"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(23, 31, 51, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-surface-container-lowest font-body text-on-surface min-h-screen flex items-center justify-center antialiased">
    
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-container/10 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-tertiary-container/5 blur-[120px]"></div>
    </div>

    <main class="relative w-full min-h-screen grid grid-cols-1 lg:grid-cols-2 glass-panel overflow-hidden shadow-none border-none">
        
        <section class="hidden lg:flex flex-col justify-between p-12 bg-gradient-to-br from-surface-container-low to-surface-container-lowest relative overflow-hidden" >
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-12">
                   
                    <span class="text-2xl font-black tracking-tighter text-on-surface">ChatRMI</span>
                </div>
                
                <h1 class="text-5xl font-extrabold tracking-tight leading-tight mb-6">
                    Bem vindo(a) <br/>
                    <span class="text-primary">ao ChatRMI.</span>
                </h1>
                <p class="text-on-surface-variant text-lg max-w-sm">
                    Um simples espaço para conversas profundas com outros usuários.
                </p>
            </div>

            <div class="absolute inset-0 z-0 opacity-30">
                <img alt="Night background" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80"/>
                <div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest via-transparent to-transparent"></div>
            </div>
        </section>

        <section class="p-8 md:p-16 flex flex-col justify-center bg-surface-container">
            <div class="w-full max-w-md mx-auto">
                <header class="mb-10 text-center lg:text-left">
                    <h2 class="text-3xl font-bold tracking-tight text-on-surface mb-2">Seja bem vindo(a) de volta!</h2>
                    <p class="text-on-surface-variant">Volte para suas conversas.</p>
                </header>

                <form (ngSubmit)="onsubmit()" class="space-y-6">
                    

                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-outline-variant/30"></div>
                        <span class="flex-shrink mx-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Entre com sua conta</span>
                        <div class="flex-grow border-t border-outline-variant/30"></div>
                    </div>

                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-on-surface ml-1" for="email">Email</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl transition-colors group-focus-within:text-primary" >alternate_email</span>
                                
                                <input [(ngModel)]="email" name="email" class="w-full pl-12 pr-4 py-4 rounded-xl bg-surface-container-highest border border-transparent focus:border-primary/50 focus:ring-4 focus:ring-primary/10 text-on-surface placeholder:text-on-surface-variant transition-all outline-none" id="email" placeholder="name@company.com" type="email"/>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <div class="flex justify-between items-center px-1">
                                <label class="text-sm font-semibold text-on-surface" for="password">Senha</label>
                                <a class="text-xs font-bold text-primary hover:text-primary-fixed transition-colors" href="#">Esqueceu a senha?</a>
                            </div>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl transition-colors group-focus-within:text-primary">lock</span>
                                <input [(ngModel)]="password" name="password" class="w-full pl-12 pr-12 py-4 rounded-xl bg-surface-container-highest border border-transparent focus:border-primary/50 focus:ring-4 focus:ring-primary/10 text-on-surface placeholder:text-on-surface-variant transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
                                <button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
                                    <span class="material-symbols-outlined">visibility</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 px-1">
                        <input class="w-4 h-4 rounded border-outline-variant bg-surface-container-highest text-primary focus:ring-primary/40 focus:ring-offset-surface-container" id="remember" type="checkbox"/>
                        <label class="text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Lembrar desta conta</label>
                    </div>

                    <button class="w-full py-4 rounded-xl bg-primary-container hover:bg-blue-600 text-white font-bold text-lg shadow-xl shadow-primary/20 active:scale-[0.98] transition-all relative overflow-hidden group" type="submit">
                        <span class="relative z-10">Entrar</span>
                        <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                    </button>
                </form>

                <footer class="mt-10 text-center">
                    <p class="text-on-surface-variant">
                        Não tem uma conta? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2" href="#">Criar Conta</a>
                    </p>
                </footer>
            </div>
        </section>
    </main>

    

</body>
</html>
